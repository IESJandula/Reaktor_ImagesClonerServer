spring:
  application:
    name: images-cloner
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  datasource:
    url: jdbc:mysql://localhost:3306/reaktor_imagesclonerserver?createDatabaseIfNotExist=true
