spring:
  application:
    name: internal-components
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  datasource:
    url: jdbc:mysql://localhost:3306/reaktor_internalcomponentsserver?createDatabaseIfNotExist=true
    username: root
    password: toor
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 5
  servlet:
    multipart:
      max-request-size: -1
      max-file-size: -1
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
server:
  port: 8094

reaktor:
  publicKeyFile: C:\claves\public_key.pem
  urlCors: http://localhost:5173
  internal_components_server_url: http://localhost:8094/
  firebase_server_url: http://localhost:8083/
  notifications_server_url: http://localhost:8088/
  school_base_server_url: http://localhost:8093/
  clientId: "internal-components"
  http_connection_timeout: 30000
  audit:
    exchange: audit.exchange
    routing-key: audit.key
