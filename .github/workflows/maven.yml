name: Java CI with Maven

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: self-hosted
    strategy:
      matrix:
        os: [linux]

    steps:
    - uses: actions/checkout@v3
    - name: Build with Maven
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        PUBLIC_KEY_FILE: ${{ secrets.PUBLIC_KEY_FILE }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
        RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
      run: |
        echo "DB_PASSWORD=${DB_PASSWORD}" > src/main/resources/application-VPS-filter.properties
        echo "PUBLIC_KEY_FILE=${PUBLIC_KEY_FILE}" >> src/main/resources/application-VPS-filter.properties
        echo "CLIENT_ID=${CLIENT_ID}" >> src/main/resources/application-VPS-filter.properties
        echo "RABBITMQ_USERNAME=${RABBITMQ_USERNAME}" >> src/main/resources/application-VPS-filter.properties
        echo "RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}" >> src/main/resources/application-VPS-filter.properties
        mvn clean install -Dspring.config.location=src/main/resources/application-VPS.yaml

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
